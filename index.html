<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

#reader{
width:100%;
max-width:500px;
margin:auto;
margin-top:20px;
}

#status{
margin-top:15px;
font-size:20px;
font-weight:bold;
}

.ok{
color:#00ff9c;
}

.erro{
color:#ff5c5c;
}

</style>

</head>


<body>

<h2>BIPADOR</h2>

<div id="reader"></div>

<div id="status"></div>


<script>


let urlScript = "COLE_AQUI_SUA_URL_DO_APP_SCRIPT";


let audioCtx;

let bloqueado = false;

let ultimoCodigo = "";


// vibração
function vibrar(){

if(navigator.vibrate){

navigator.vibrate(150);

}

}


// bip normal
function beep(){

if(!audioCtx){

audioCtx = new (window.AudioContext || window.webkitAudioContext)();

}

let osc = audioCtx.createOscillator();

let gain = audioCtx.createGain();

osc.connect(gain);

gain.connect(audioCtx.destination);

osc.frequency.value = 900;

osc.start();

gain.gain.setValueAtTime(1,audioCtx.currentTime);

gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);

osc.stop(audioCtx.currentTime+0.2);

}



// bip duplicado
function beepErro(){

if(!audioCtx){

audioCtx = new (window.AudioContext || window.webkitAudioContext)();

}

let osc = audioCtx.createOscillator();

let gain = audioCtx.createGain();

osc.connect(gain);

gain.connect(audioCtx.destination);

osc.frequency.value = 300;

osc.start();

gain.gain.setValueAtTime(1,audioCtx.currentTime);

gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);

osc.stop(audioCtx.currentTime+0.4);

}



function mostrarStatus(msg,classe){

let el = document.getElementById("status");

el.innerHTML = msg;

el.className = classe;

}



async function enviar(codigo){

let resposta = await fetch(urlScript,{

method:"POST",

body:new URLSearchParams({

codigo:codigo

})

});


let texto = await resposta.text();

return texto;

}



function iniciarLeitor(){

let html5QrCode = new Html5Qrcode("reader");


html5QrCode.start(

{ facingMode: "environment" },

{
fps:10,
qrbox:250
},

codigo => {


if(bloqueado) return;


// evita ler o mesmo código várias vezes seguidas
if(codigo == ultimoCodigo) return;


bloqueado = true;

ultimoCodigo = codigo;


enviar(codigo).then(resposta => {


vibrar();


if(resposta == "duplicado"){

beepErro();

mostrarStatus("DUPLICADO ⚠️","erro");

}else{

beep();

mostrarStatus("OK ✔️","ok");

}


setTimeout(()=>{

bloqueado = false;

},1500);


});


},

erro => {}

);


}


iniciarLeitor();


</script>

</body>

</html>
