<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body style="font-family:Arial;text-align:center">

<h2>Bipador via celular</h2>

<button onclick="startScanner()" style="font-size:22px;padding:15px">
Iniciar leitura
</button>
<button id="btn-bipar" style="padding: 15px 30px; font-size: 20px; background-color: #28a745; color: white; border: none; borderRadius: 8px;">
    BIPAR
</button>

<div id="reader" style="width: 300px;"></div>
<br><br>

<div id="reader" style="width:320px;margin:auto"></div>

<script>

function startScanner(){

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
{ facingMode: "environment" },
{
fps: 10,
qrbox: 250
},
codigo => {

fetch("https://script.google.com/macros/s/AKfycbxoazerTBp9E7k3MMoWbMxiMKK5gEkk_E-x6U_sMtte0MHyPk13z5hB6y0Xr_8EoBbGeA/exec", {
method:"POST",
body:new URLSearchParams({
codigo: codigo
})
});

}
);

}

</script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
const urlScript = "https://script.google.com/macros/s/AKfycbxoazerTBp9E7k3MMOwbMxiMKK5gEkk_E-x6U_sMtteOMHyPk13z5hB6y0Xr_8EoBbGeA/exec";

function enviarParaSheets(codigo) {
    fetch(urlScript, {
        method: "POST",
        mode: "no-cors",
        body: new URLSearchParams({ "codigo": codigo })
    })
    .then(() => console.log("Código enviado: " + codigo))
    .catch(err => alert("Erro ao enviar: " + err));
}

const btnBipar = document.getElementById('btn-bipar');
const html5QrCode = new Html5Qrcode("reader");

btnBipar.addEventListener('click', () => {
    btnBipar.innerText = "LENDO...";
    btnBipar.style.backgroundColor = "#ffc107";

    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 150 } },
        (codigoLido) => {
            html5QrCode.stop().then(() => {
                enviarParaSheets(codigoLido);
                btnBipar.innerText = "BIPAR";
                btnBipar.style.backgroundColor = "#28a745";
                alert("Bipado: " + codigoLido);
            }).catch(err => console.error(err));
        },
        (errorMessage) => {}
    ).catch(err => alert("Câmera não encontrada: " + err));
});
</script>
    
</body>
</html>
