<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bipador Logístico Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; margin: 0; }
        h2 { color: #333; margin-bottom: 20px; }
        
        #btn-bipar { 
            padding: 20px; width: 100%; max-width: 300px; font-size: 22px; font-weight: bold;
            background-color: #28a745; color: white; border: none; border-radius: 12px; 
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s;
        }
        #btn-bipar:active { transform: scale(0.95); }

        #reader { 
            width: 100%; max-width: 350px; margin: 20px auto; 
            border-radius: 15px; overflow: hidden; border: 4px solid #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* Overlay de Sucesso (Tela Verde) */
        #success-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #28a745; color: white; z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
        }
        #success-overlay h1 { font-size: 100px; margin: 0; font-weight: bold; }
        #success-overlay p { font-size: 24px; }
    </style>
</head>
<body>

    <div id="success-overlay">
        <h1>OK</h1>
        <p id="msg-codigo"></p>
    </div>

    <h2>Bipador Logístico</h2>
    <button id="btn-bipar">BIPAR</button>
    <div id="reader"></div>

    <script>
        const urlScript = "https://script.google.com/macros/s/AKfycbyn57vL-4bkj0l5zRdpdHULT-KhizeOmo3QWyLPVwE_GgTUicxxhoYy8vcZWm5NmS6ZhQ/exec";
        const btnBipar = document.getElementById('btn-bipar');
        const overlay = document.getElementById('success-overlay');
        const msgCodigo = document.getElementById('msg-codigo');
        const html5QrCode = new Html5Qrcode("reader");

        // Função para gerar o som de "Beep" via software
        function tocarBeep() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = context.createOscillator();
            const gain = context.createGain();

            oscillator.type = "sine";
            oscillator.frequency.setValueAtTime(800, context.currentTime); // Frequência do bipe
            oscillator.connect(gain);
            gain.connect(context.destination);

            gain.gain.setValueAtTime(0, context.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, context.currentTime + 0.01);
            gain.gain.linearRampToValueAtTime(0, context.currentTime + 0.2);

            oscillator.start();
            oscillator.stop(context.currentTime + 0.2);
        }

        function enviarParaSheets(codigo) {
            fetch(urlScript, {
                method: "POST",
                mode: "no-cors",
                body: new URLSearchParams({ "codigo": codigo })
            });
        }

        function mostrarSucesso(codigo) {
            tocarBeep(); // Toca o som de bipe
            msgCodigo.innerText = "Lido: " + codigo;
            overlay.style.display = "flex";
            
            setTimeout(() => {
                overlay.style.display = "none";
            }, 1000); // Tela verde por 1 segundo
        }

        btnBipar.addEventListener('click', () => {
            if (btnBipar.innerText === "LENDO...") return;

            btnBipar.innerText = "LENDO...";
            btnBipar.style.backgroundColor = "#ffc107";

            html5QrCode.start(
                { facingMode: "environment" },
                { 
                    fps: 15, 
                    qrbox: { width: 250, height: 250 } 
                },
                (codigoLido) => {
                    html5QrCode.stop().then(() => {
                        enviarParaSheets(codigoLido);
                        mostrarSucesso(codigoLido);
                        
                        btnBipar.innerText = "BIPAR";
                        btnBipar.style.backgroundColor = "#28a745";
                    });
                },
                (errorMessage) => {}
            ).catch(err => {
                alert("Erro: " + err);
                btnBipar.innerText = "BIPAR";
            });
        });
    </script>
</body>
</html>
