<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body style="font-family:Arial;text-align:center">

<h2>Bipador via celular</h2>

<button onclick="startScanner()" style="font-size:22px;padding:15px">
Iniciar leitura
</button>
<button id="btn-bipar" style="padding: 15px 30px; font-size: 20px; background-color: #28a745; color: white; border: none; borderRadius: 8px;">
    BIPAR
</button>

<div id="reader" style="width: 300px;"></div>
<br><br>

<div id="reader" style="width:320px;margin:auto"></div>

<script>

function startScanner(){

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
{ facingMode: "environment" },
{
fps: 10,
qrbox: 250
},
codigo => {

fetch("https://script.google.com/macros/s/AKfycbxoazerTBp9E7k3MMoWbMxiMKK5gEkk_E-x6U_sMtte0MHyPk13z5hB6y0Xr_8EoBbGeA/exec", {
method:"POST",
body:new URLSearchParams({
codigo: codigo
})
});

}
);

}

</script>

</body>
</html>
