<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{

font-family:Arial;

text-align:center;

background:#111;

color:white;

}

button{

font-size:20px;

padding:12px 25px;

margin-top:20px;

background:#00ff9c;

border:none;

border-radius:8px;

font-weight:bold;

}

#reader{

width:100%;

max-width:500px;

margin:auto;

margin-top:20px;

}

#status{

margin-top:15px;

font-size:20px;

font-weight:bold;

}

.ok{

color:#00ff9c;

}

.erro{

color:#ff5c5c;

}

</style>

</head>


<body>

<h2>BIPADOR</h2>

<button onclick="iniciarCamera()">

BIPAR

</button>

<div id="reader"></div>

<div id="status"></div>


<script>


let urlScript = "COLE_AQUI_SUA_URL_DO_APP_SCRIPT";

let scanner;

let audioCtx;

let bloqueado = false;



function vibrar(){

if(navigator.vibrate){

navigator.vibrate(150);

}

}



function beep(){

if(!audioCtx){

audioCtx = new (window.AudioContext || window.webkitAudioContext)();

}

let osc = audioCtx.createOscillator();

let gain = audioCtx.createGain();

osc.connect(gain);

gain.connect(audioCtx.destination);

osc.frequency.value = 900;

osc.start();

gain.gain.setValueAtTime(1,audioCtx.currentTime);

gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);

osc.stop(audioCtx.currentTime+0.2);

}



function beepErro(){

if(!audioCtx){

audioCtx = new (window.AudioContext || window.webkitAudioContext)();

}

let osc = audioCtx.createOscillator();

let gain = audioCtx.createGain();

osc.connect(gain);

gain.connect(audioCtx.destination);

osc.frequency.value = 300;

osc.start();

gain.gain.setValueAtTime(1,audioCtx.currentTime);

gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);

osc.stop(audioCtx.currentTime+0.4);

}



function mostrarStatus(msg,classe){

let el = document.getElementById("status");

el.innerHTML = msg;

el.className = classe;

}



async function enviar(codigo){

let resposta = await fetch(urlScript,{

method:"POST",

body:new URLSearchParams({

codigo:codigo

})

});


return await resposta.text();

}



function iniciarCamera(){


scanner = new Html5Qrcode("reader");


scanner.start(

{ facingMode: "environment" },

{

fps:10,

qrbox:250

},

codigo => {


if(bloqueado) return;

bloqueado = true;


enviar(codigo).then(resposta => {


vibrar();


if(resposta == "duplicado"){

beepErro();

mostrarStatus("DUPLICADO ⚠️","erro");

}else{

beep();

mostrarStatus("OK ✔️","ok");

}


setTimeout(()=>{

bloqueado = false;

},1500);


});


},

erro => {}

);


}


</script>

</body>

</html>
