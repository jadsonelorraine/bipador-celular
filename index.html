<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bipador Logístico</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        #btn-bipar { 
            padding: 20px; width: 100%; max-width: 300px; font-size: 22px; font-weight: bold;
            background-color: #28a745; color: white; border: none; border-radius: 12px; cursor: pointer;
        }
        #reader { width: 100%; max-width: 400px; margin: 20px auto; border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body>

    <h2>Bipador via Celular</h2>
    
    <button id="btn-bipar">BIPAR</button>
    <div id="reader"></div>

    <script>
        // Configurações do seu Google Sheets
        const urlScript = "https://script.google.com/macros/s/AKfycbyn57vL-4bkj0l5zRdpdHULT-KhizeOmo3QWyLPVwE_GgTUicxxhoYy8vcZWm5NmS6ZhQ/exec";
        
        const btnBipar = document.getElementById('btn-bipar');
        const html5QrCode = new Html5Qrcode("reader");

        // Função para enviar os dados para a planilha
        function enviarParaSheets(codigo) {
            fetch(urlScript, {
                method: "POST",
                mode: "no-cors",
                body: new URLSearchParams({ "codigo": codigo })
            })
            .then(() => console.log("Enviado: " + codigo))
            .catch(err => alert("Erro no envio: " + err));
        }

        // Lógica de acionamento manual
        btnBipar.addEventListener('click', () => {
            // Evita abrir a câmera duas vezes se já estiver lendo
            if (btnBipar.innerText === "LENDO...") return;

            btnBipar.innerText = "LENDO...";
            btnBipar.style.backgroundColor = "#ffc107";

            html5QrCode.start(
                { facingMode: "environment" }, // Força câmera traseira
                { fps: 10, qrbox: { width: 250, height: 150 } },
                (codigoLido) => {
                    // SUCESSO: Leu o código
                    
                    // PARA a câmera IMEDIATAMENTE após o primeiro bipe
                    html5QrCode.stop().then(() => {
                        // Só então envia para o Sheets
                        enviarParaSheets(codigoLido);

                        // Reseta o botão para o estado inicial
                        btnBipar.innerText = "BIPAR";
                        btnBipar.style.backgroundColor = "#28a745";
                        
                        alert("Bipado: " + codigoLido);
                    }).catch(err => console.error("Erro ao parar câmera:", err));
                },
                (errorMessage) => {
                    // Apenas procurando o código...
                }
            ).catch(err => {
                alert("Erro ao abrir câmera: " + err);
                btnBipar.innerText = "BIPAR";
                btnBipar.style.backgroundColor = "#28a745";
            });
        });
    </script>
    
</body>
</html>
