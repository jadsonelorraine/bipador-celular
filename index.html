<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bipador Logístico</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family: Arial;
text-align:center;
padding:20px;
background:#f5f5f5;
}

button{

font-size:22px;
padding:20px;
width:90%;
max-width:300px;

border:none;
border-radius:12px;

background:#28a745;
color:white;

}

#reader{

margin-top:20px;

}

#ok{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#28a745;

color:white;

font-size:40px;

justify-content:center;
align-items:center;

flex-direction:column;

}

</style>

</head>

<body>

<h2>Bipador</h2>

<button id="btn">BIPAR</button>

<div id="reader"></div>

<div id="ok">

OK

<br>

<span id="codigo"></span>

</div>

<script>

const urlScript = "https://script.google.com/macros/s/AKfycbxShUtv5yMcNi2qvQiC_TH-5kbqKVekt-1GuAVhRxoXrgSVtMEUoHsuk79UUhEyTi3qng/exec";

const btn = document.getElementById("btn");

const ok = document.getElementById("ok");

const codigoTxt = document.getElementById("codigo");

let audioCtx;

let scanner;



function beep(){

if(!audioCtx){

audioCtx = new (window.AudioContext || window.webkitAudioContext)();

}

let osc = audioCtx.createOscillator();

let gain = audioCtx.createGain();

osc.connect(gain);

gain.connect(audioCtx.destination);

osc.frequency.value = 900;

osc.start();

gain.gain.setValueAtTime(1,audioCtx.currentTime);

gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);

osc.stop(audioCtx.currentTime+0.2);

}



function enviar(codigo){

fetch(urlScript,{

method:"POST",

body:new URLSearchParams({

codigo:codigo

})

});

}



btn.onclick = () => {

btn.innerText="LENDO...";

scanner = new Html5Qrcode("reader");

scanner.start(

{ facingMode:"environment" },

{ fps:15, qrbox:250 },

codigo => {

scanner.stop();

enviar(codigo);

beep();

codigoTxt.innerText=codigo;

ok.style.display="flex";

setTimeout(()=>{

ok.style.display="none";

btn.innerText="BIPAR";

},1000);

}

);

};

</script>

</body>

</html>
